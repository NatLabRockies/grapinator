[GRAPHENE]
GQL_SCHEMA = /resources/schema.dct

[AUTH]
# Authentication mode: off (default), mixed, or required.
#   off      — No auth checking; all existing deployments continue unchanged.
#   mixed    — Unauthenticated requests reach public fields; role-restricted
#              fields/entities require a valid bearer token with matching roles.
#   required — Every request (except CORS preflight and optionally the GraphiQL
#              IDE page) must carry a valid bearer token.
AUTH_MODE = off
# --- Production IdP settings (uncomment and fill in for your IdP) ----------
# AUTH_JWKS_URI = https://login.microsoftonline.com/{tenant-id}/discovery/v2.0/keys
# AUTH_ISSUER   = https://login.microsoftonline.com/{tenant-id}/v2.0
# AUTH_AUDIENCE = <client-id>
# AUTH_ALGORITHMS = RS256
# AUTH_ROLES_CLAIM = roles
# AUTH_JWKS_CACHE_TTL = 300
# --- GraphiQL IDE access when auth is enabled --------------------------------
# GRAPHIQL_ACCESS values:
#   authenticated — IDE page requires a valid token (default).
#   open          — IDE page is served without auth (token still needed for queries).
#   off           — IDE is disabled entirely; the endpoint only returns JSON.
# GRAPHIQL_ACCESS = authenticated
# --- Local development only (never set in production) -----------------------
# AUTH_DEV_SECRET = change-me-local-dev-only

[WSGI]
WSGI_SOCKET_HOST = 127.0.0.1
WSGI_SOCKET_PORT = 8443
# CherryPy worker threads. CherryPy's built-in default is 10.
# For production Oracle deployments set this equal to DB_POOL_SIZE so every
# thread can hold a connection without queuing.
WSGI_THREAD_POOL = 10
# --- Optional enterprise CherryPy tuning (uncomment and adjust as needed) ---
# WSGI_SOCKET_QUEUE_SIZE    = 20   # OS TCP accept backlog (CherryPy default: 5)
# WSGI_MAX_REQUEST_BODY_SIZE = 1048576  # Max request body in bytes (0 = unlimited)
# WSGI_SHUTDOWN_TIMEOUT     = 10   # Seconds to drain in-flight requests on stop
# WSGI_ACCEPTED_QUEUE_SIZE  = 100  # Internal accept queue limit (-1 = unlimited)

[CORS]
CORS_ENABLE = True
CORS_EXPOSE_ORIGINS = *
CORS_ALLOW_METHODS = GET, POST
CORS_HEADER_MAX_AGE = 1800
CORS_ALLOW_HEADERS = Origin, X-Requested-With, Content-Type, Accept
CORS_EXPOSE_HEADERS = Location
# these 2 settings are mutually exclusive
CORS_SEND_WILDCARD = True
CORS_SUPPORTS_CREDENTIALS = False

[HTTP_HEADERS]
HTTP_HEADERS_XFRAME = sameorigin
HTTP_HEADERS_XSS_PROTECTION = 1; mode=block
HTTP_HEADER_CACHE_CONTROL = no-cache, no-store, must-revalidate, max-age=0, s-maxage=0, pre-check=0, post-check=0, pragma: no-cache
HTTP_HEADERS_X_CONTENT_TYPE_OPTIONS = nosniff
HTTP_HEADERS_REFERRER_POLICY = strict-origin-when-cross-origin
HTTP_HEADERS_CONTENT_SECURITY_POLICY = default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com data:; img-src 'self' data: https: http:; connect-src 'self' ws: wss: http: https:; frame-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'

[FLASK]
FLASK_SERVER_NAME = localhost:8443
FLASK_API_ENDPOINT = /northwind/gql
FLASK_DEBUG = False

[SQLALCHEMY]
DB_TYPE = sqlite+pysqlite
DB_CONNECT = /db/northwind.db
SQLALCHEMY_TRACK_MODIFICATIONS = False
# --- Connection pool settings -----------------------------------------------
# For SQLite (this config) the defaults below are appropriate.
# For Oracle/production: set DB_POOL_SIZE equal to WSGI_THREAD_POOL so every
# thread can hold a connection without queuing; enable DB_POOL_RECYCLE to
# prevent ORA-03135 / ORA-02396 from Oracle idle-session timeouts.
#
# DB_POOL_SIZE          = 10    # Persistent connections in pool (SA default: 5)
# DB_POOL_MAX_OVERFLOW  = 10    # Burst connections above pool_size (SA default: 10)
# DB_POOL_TIMEOUT       = 15    # Seconds to wait for a free connection (SA default: 30)
# DB_POOL_RECYCLE       = 1800  # Seconds before recycling; critical for Oracle (SA default: -1)
# DB_POOL_PRE_PING      = True  # Validate connection health on checkout (recommended: True)
