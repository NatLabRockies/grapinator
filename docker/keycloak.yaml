# Docker Compose stack for local Keycloak development
#
# Starts a Keycloak instance in dev mode with a pre-configured realm, client,
# and test users suitable for developing against Grapinator's [AUTH] settings.
#
# Usage:
#   docker compose -f docker/keycloak.yaml up -d
#
# Keycloak admin console: http://localhost:8080  (admin / admin)
# Realm:                  grapinator-dev
# Client ID:              grapinator-api
# Client secret:          grapinator-api-secret
#
# Test users (realm: grapinator-dev)
#   username: hruser    password: hruser    roles: hr
#   username: admin     password: admin     roles: hr, admin
#
# Corresponding grapinator_rbac_keycloakdev.ini [AUTH] block:
#   AUTH_MODE         = mixed
#   AUTH_JWKS_URI     = http://localhost:8080/realms/grapinator-dev/protocol/openid-connect/certs
#   AUTH_ISSUER       = http://localhost:8080/realms/grapinator-dev
#   AUTH_AUDIENCE     = grapinator-api
#   AUTH_ALGORITHMS   = RS256
#   AUTH_ROLES_CLAIM  = realm_access.roles
#   GRAPHIQL_ACCESS   = open

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./resources/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:8080/realms/grapinator-dev/.well-known/openid-configuration \
            > /dev/null
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
